<!DOCTYPE html>
<html>
  <head>
    <title>ChaiCode Dashboard</title>
  </head>
  <body>
    <h1>ChaiCode Analytics Dashboard</h1>
    <table border="1">
        <colgroup>
            <col style="background-color:lightyellow;">
            <col style="background-color: aliceblue;">
            <col style="background-color: aquamarine;">
        </colgroup>
        <caption>ChaiCode course information</caption>
        <thead>
            <tr>
                <th>course</th>
                <th>duration</th>
                <th>level</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Html</td>
                <td>2weeks</td>
                <td>Beginner</td>
            </tr>
            <tr>
                <td>Css</td>
                <td>3weeks</td>
                <td>Intermediate</td>
            </tr>
            <tr>
                <td rowspan="2">javascript</td>
                <td>5weeks</td>
                <td>advance</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <th>total</th>
                <th>11weeks</th>
            </tr>
        </tfoot>
    </table>
  </body>
</html>
