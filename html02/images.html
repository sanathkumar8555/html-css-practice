<!DOCTYPE html>
<html>
  <head>
    <title>ChaiCode Gallery</title>
  </head>
  <body>
    <h1>ChaiCode Visual Story</h1>
    
    <a href="http://ChaiCode.com">
        <img src="logo.png" alt="ChaiCode logo">

    <figure>
        <img src="logo.png" alt="ChaiCode">

    </picture>
